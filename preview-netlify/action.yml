name: 'Preview Netlify'
description: 'Deploys lecture builds to Netlify for PR previews with smart comments showing changed pages'
author: 'QuantEcon'

inputs:
  netlify-auth-token:
    description: 'Netlify authentication token (use secrets.NETLIFY_AUTH_TOKEN)'
    required: true
  netlify-site-id:
    description: 'Netlify site ID (use secrets.NETLIFY_SITE_ID)'
    required: true
  build-dir:
    description: 'Directory containing built site'
    required: true
  lectures-dir:
    description: 'Directory containing lecture .md files for change detection. Set to empty string to disable.'
    required: false
    default: 'lectures'

outputs:
  deploy-url:
    description: 'URL of the deployed preview site'
    value: ${{ steps.deploy.outputs.deploy-url }}
  changed-files:
    description: 'List of changed lecture files'
    value: ${{ steps.detect-changes.outputs.changed-files }}

runs:
  using: "composite"
  steps:
    - name: Check for trusted actor
      id: check-trust
      shell: bash
      run: |
        # Skip for dependabot and fork PRs (they can't access secrets)
        if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
          echo "skip=true" >> $GITHUB_OUTPUT
          echo "⚠️ Skipping Netlify deploy for dependabot"
        elif [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
          echo "skip=true" >> $GITHUB_OUTPUT
          echo "⚠️ Skipping Netlify deploy for fork PR"
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi

    - name: Detect Changed Lecture Files
      id: detect-changes
      if: steps.check-trust.outputs.skip != 'true' && inputs.lectures-dir != '' && github.event_name == 'pull_request'
      shell: bash
      env:
        LECTURES_DIR: ${{ inputs.lectures-dir }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: bash "$GITHUB_ACTION_PATH/../scripts/detect-changed-lectures.sh"

    - name: Install Netlify CLI
      if: steps.check-trust.outputs.skip != 'true'
      shell: bash
      run: npm install -g netlify-cli@latest

    - name: Deploy to Netlify
      id: deploy
      if: steps.check-trust.outputs.skip != 'true' && github.event_name == 'pull_request'
      shell: bash
      run: |
        PR_NUMBER="${{ github.event.pull_request.number }}"
        COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
        SHORT_SHA="${COMMIT_SHA:0:7}"
        
        echo "🔍 Deploying preview for PR #${PR_NUMBER}..."
        
        DEPLOY_OUTPUT=$(netlify deploy \
          --dir="${{ inputs.build-dir }}" \
          --site="${{ inputs.netlify-site-id }}" \
          --auth="${{ inputs.netlify-auth-token }}" \
          --alias="pr-${PR_NUMBER}" \
          --message="PR #${PR_NUMBER} (${SHORT_SHA})" \
          --json)
        
        echo "::group::Deployment Output"
        echo "$DEPLOY_OUTPUT"
        echo "::endgroup::"
        
        # Extract URL from JSON output (use Python instead of jq for container compatibility)
        DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('deploy_url') or d.get('url',''))")
        
        # Validate deployment URL
        if [ -z "$DEPLOY_URL" ]; then
          echo "❌ Error: Failed to extract deployment URL from Netlify response"
          echo "Raw output was:"
          echo "$DEPLOY_OUTPUT"
          exit 1
        fi
        
        echo "deploy-url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        
        echo "✅ Deployment successful!"
        echo "📍 URL: $DEPLOY_URL"

    - name: Comment on PR
      if: steps.check-trust.outputs.skip != 'true' && github.event_name == 'pull_request' && steps.deploy.outputs.deploy-url != ''
      uses: actions/github-script@v7
      env:
        DEPLOY_URL: ${{ steps.deploy.outputs.deploy-url }}
        CHANGED_FILES: ${{ steps.detect-changes.outputs.changed-files }}
        LECTURES_DIR: ${{ inputs.lectures-dir }}
        STRIP_LECTURES_DIR: ${{ steps.detect-changes.outputs.strip-lectures-dir }}
        COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
      with:
        github-token: ${{ github.token }}
        script: |
          // Untrusted PR data (file paths, deploy URL) is read from env, never
          // interpolated into the script body (avoids script injection).
          const deployUrl = process.env.DEPLOY_URL || '';
          const changedFiles = process.env.CHANGED_FILES || '';
          const lecturesDir = process.env.LECTURES_DIR || '';
          const stripLecturesDir = process.env.STRIP_LECTURES_DIR === 'true';
          const prNumber = context.issue.number;
          const commitSha = process.env.COMMIT_SHA || '';
          const shortSha = commitSha.substring(0, 7);
          const commitUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${commitSha}`;
          
          // Build the comment body
          let comment = `## 📖 Netlify Preview Ready!\n\n`;
          comment += `**Preview URL:** ${deployUrl}\n\n`;
          comment += `**Commit:** [\`${shortSha}\`](${commitUrl})\n\n`;
          
          // Add direct links to changed lecture pages
          if (changedFiles && changedFiles.trim() && lecturesDir) {
            const files = changedFiles.split('\n').filter(f => f.trim());
            if (files.length > 0) {
              comment += `### 📚 Changed Lectures\n\n`;
              for (const file of files) {
                const cleanFile = file.trim();
                if (cleanFile) {
                  // Determine URL path based on _toc.yml location
                  // If _toc.yml is in lectures-dir, strip the dir (JB builds relative to it)
                  // If _toc.yml is at root, keep the dir (JB preserves structure)
                  let filePath;
                  if (stripLecturesDir) {
                    filePath = cleanFile.replace(`${lecturesDir}/`, '').replace('.md', '');
                  } else {
                    filePath = cleanFile.replace('.md', '');
                  }
                  const displayName = filePath.split('/').pop();  // Just filename for display
                  const pageUrl = `${deployUrl}/${filePath}.html`;
                  comment += `- [${displayName}](${pageUrl})\n`;
                }
              }
              comment += '\n';
            }
          }
          
          // Add build info
          comment += `---\n`;
          comment += `<details><summary>Build Info</summary>\n\n`;
          comment += `- **Workflow:** [${context.workflow}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n`;
          comment += `</details>\n`;
          
          // Check for existing preview comment and update it
          const comments = await github.rest.issues.listComments({
            issue_number: prNumber,
            owner: context.repo.owner,
            repo: context.repo.repo,
          });
          
          const marker = '## 📖 Netlify Preview Ready!';
          const existingComment = comments.data.find(c => c.body.includes(marker));
          
          if (existingComment) {
            await github.rest.issues.updateComment({
              comment_id: existingComment.id,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
            console.log(`Updated existing comment ${existingComment.id}`);
          } else {
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
            console.log('Created new comment');
          }

    - name: Skip notification
      if: steps.check-trust.outputs.skip == 'true'
      shell: bash
      run: |
        echo "⚠️ Netlify deployment skipped (untrusted actor or fork PR)"
        echo "This is expected for dependabot PRs and PRs from forks."

branding:
  icon: 'upload-cloud'
  color: 'blue'
