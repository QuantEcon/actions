# Full environment for QuantEcon lectures (maximum compatibility)
# Uses Anaconda metapackage for comprehensive package coverage
# For lean builds, use quantecon-build container instead

name: quantecon
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.13
  - anaconda=2026.06  # Full Anaconda: numpy, scipy, pandas, matplotlib, seaborn, sympy, jupyter, jupyterlab, ipywidgets, networkx, statsmodels, numba, and 400+ more
  - nodejs>=20,<25    # netlify-cli (preview-netlify) + jupyterlab; capped at node 24 LTS (exclude non-LTS 25)
  - pip
  - pip:
    # Jupyter Book build tools
    - jupyter-book==1.0.4post1
    - quantecon-book-theme==0.21.0
    - sphinx-tojupyter==0.6.0
    - sphinxext-rediraffe==0.3.0
    - sphinx-exercise==1.2.1
    - sphinx-proof==0.4.0
    - sphinxcontrib-youtube==1.5.0
    - sphinx-togglebutton==0.4.5
    - sphinx-reredirects==1.1.0
    - quantecon-book-networks
    # Pinned <1.0: kaleido v1 dropped the bundled chromium and needs a separately
    # provisioned Chrome, which isn't found at runtime in CI (container jobs set
    # HOME=/github/home, not the build-time /root). v0.2.x bundles its own
    # chromium (location-independent) and still works with current plotly. (#28-class)
    - kaleido<1.0  # Plotly static image export
