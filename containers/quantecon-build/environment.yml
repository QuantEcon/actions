# Lean environment for QuantEcon lecture builds
# Contains superset of packages used across all QuantEcon lecture series
# Lecture-specific packages (quantecon, wbgapi, jax, etc.) installed from lecture's environment.yml

name: quantecon
channels:
  - defaults
dependencies:
  # Python
  - python=3.13
  
  # Core scientific stack — pinned to the Anaconda 2025.12 baseline that every
  # QuantEcon lecture repo builds against (they pin `anaconda=2025.12`), keeping
  # this lean image reproducible and consistent with the full `quantecon` image
  # and the source repos. Left unpinned, the stack drifted ahead of that baseline
  # and produced non-reproducible images that broke notebook execution downstream
  # (e.g. un_insure.md's fsolve call; see #28).
  # Bump as a set when the lecture repos move to a newer anaconda release.
  - numpy=2.3.5
  - scipy=1.16.3
  - pandas=2.3.3
  - matplotlib=3.10.6
  - seaborn=0.13.2
  - sympy=1.14.0
  - numba=0.62.1
  - networkx=3.5
  - statsmodels=0.14.5
  - scikit-learn=1.7.2
  
  # CPU acceleration (Intel MKL for optimized linear algebra)
  - mkl
  - mkl-service
  
  # Jupyter ecosystem
  - jupyter
  - jupyterlab
  - ipywidgets
  - ipykernel
  - notebook
  
  # Data handling
  - xlrd
  - openpyxl
  - pytables
  - h5py
  
  # Visualization
  - plotly
  - graphviz
  - python-graphviz
  
  # Utilities
  - requests
  - beautifulsoup4
  - lxml
  - pyyaml
  
  # Build tools
  - nodejs>=20,<25  # Jupyter extensions; capped at node 24 LTS (exclude non-LTS 25)
  
  - pip
  - pip:
    # Jupyter Book build tools
    - jupyter-book>=1.0.4post1,<2.0
    - quantecon-book-theme>=0.21.0
    - sphinx-tojupyter>=0.6.0
    - sphinxext-rediraffe>=0.3.0
    - sphinx-exercise>=1.2.1
    - sphinx-proof>=0.4.0
    - sphinxcontrib-youtube>=1.5.0
    - sphinx-togglebutton>=0.4.5
    - sphinx-reredirects>=1.1.0
    - quantecon-book-networks
    
    # Additional build dependencies
    # Pinned <1.0: kaleido v1 dropped the bundled chromium and needs a separately
    # provisioned Chrome, which isn't found at runtime in CI (container jobs set
    # HOME=/github/home, not the build-time /root). v0.2.x bundles its own
    # chromium (location-independent) and still works with current plotly. (#28-class)
    - kaleido<1.0  # Plotly static image export
    - prettytable
