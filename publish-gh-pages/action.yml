name: 'Publish to GitHub Pages'
description: 'Publishes lecture builds to GitHub Pages using native GitHub Pages deployment (no gh-pages branch needed)'
author: 'QuantEcon'

inputs:
  build-dir:
    description: 'Directory containing built site'
    required: true
  cname:
    description: 'Custom domain for GitHub Pages (added as CNAME file)'
    required: false
    default: ''
  create-release-assets:
    description: 'Create and upload release assets (HTML archive, checksum, manifest)'
    required: false
    default: 'false'
  asset-name:
    description: 'Base name for release assets (e.g., "lecture-python-html")'
    required: false
    default: ''
  github-token:
    description: 'GitHub token for uploading release assets (only needed if create-release-assets is true)'
    required: false
    default: ''

outputs:
  page-url:
    description: 'URL of the deployed GitHub Pages site'
    value: ${{ steps.deployment.outputs.page_url }}
  asset-url:
    description: 'URL of the uploaded release asset (if created)'
    value: ${{ steps.upload-release.outputs.asset-url }}

runs:
  using: "composite"
  steps:
    - name: Prepare build directory
      id: prepare
      shell: bash
      run: |
        echo "Preparing build directory: ${{ inputs.build-dir }}"
        
        # Verify build directory exists
        if [ ! -d "${{ inputs.build-dir }}" ]; then
          echo "❌ Error: Build directory not found: ${{ inputs.build-dir }}"
          exit 1
        fi
        
        # Count files
        FILE_COUNT=$(find "${{ inputs.build-dir }}" -type f | wc -l)
        echo "📊 Files to deploy: $FILE_COUNT"
        echo "file-count=$FILE_COUNT" >> $GITHUB_OUTPUT
        
        # Calculate size
        SIZE=$(du -sh "${{ inputs.build-dir }}" | cut -f1)
        SIZE_MB=$(du -sm "${{ inputs.build-dir }}" | cut -f1)
        echo "💾 Total size: $SIZE"
        echo "size-mb=$SIZE_MB" >> $GITHUB_OUTPUT
        
        # Add CNAME file if specified
        if [ -n "${{ inputs.cname }}" ]; then
          echo "${{ inputs.cname }}" > "${{ inputs.build-dir }}/CNAME"
          echo "🌐 Added CNAME: ${{ inputs.cname }}"
        fi
        
        echo "✅ Preparation complete"

    - name: Setup Pages
      uses: actions/configure-pages@v6

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: ${{ inputs.build-dir }}

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5

    - name: Create release assets
      id: create-assets
      if: inputs.create-release-assets == 'true'
      shell: bash
      env:
        RELEASE_TOKEN: ${{ inputs.github-token }}
      run: |
        # Guard: release assets need a tag trigger and a token. Skip cleanly
        # off-tag; fail fast on a missing token (clear misconfiguration) so the
        # upload step does not error mid-flight.
        if [ "$GITHUB_REF_TYPE" != "tag" ]; then
          echo "::warning::create-release-assets is enabled but this run was not triggered by a tag (GITHUB_REF_TYPE='$GITHUB_REF_TYPE'); skipping release assets."
          echo "assets-created=false" >> $GITHUB_OUTPUT
          exit 0
        fi
        if [ -z "$RELEASE_TOKEN" ]; then
          echo "::error::create-release-assets is enabled but 'github-token' is empty. Pass a token via the github-token input (e.g. secrets.GITHUB_TOKEN)."
          exit 1
        fi

        # Determine asset name
        ASSET_NAME="${{ inputs.asset-name }}"
        if [ -z "$ASSET_NAME" ]; then
          # Default to repo name
          ASSET_NAME="${GITHUB_REPOSITORY#*/}-html"
        fi
        
        TAG_NAME="${GITHUB_REF_NAME}"
        ARCHIVE_NAME="${ASSET_NAME}-${TAG_NAME}.tar.gz"
        
        echo "📦 Creating release assets..."
        echo "   Archive: $ARCHIVE_NAME"
        
        # Write assets to a temp dir OUTSIDE build-dir so the growing tarball
        # can't recurse into itself when build-dir is the cwd or a parent.
        ARCHIVE_PATH="${RUNNER_TEMP}/${ARCHIVE_NAME}"
        CHECKSUM_PATH="${RUNNER_TEMP}/${ASSET_NAME}-checksum.txt"
        MANIFEST_PATH="${RUNNER_TEMP}/${ASSET_NAME}-manifest.json"

        # Create tarball
        tar -czf "$ARCHIVE_PATH" -C "${{ inputs.build-dir }}" .

        # Create checksum (reference just the archive filename, not the path)
        ( cd "${RUNNER_TEMP}" && sha256sum "$ARCHIVE_NAME" > "$CHECKSUM_PATH" )

        # Create manifest
        cat > "$MANIFEST_PATH" << EOF
        {
          "name": "$ASSET_NAME",
          "tag": "$TAG_NAME",
          "commit": "$GITHUB_SHA",
          "timestamp": "$(date -Iseconds)",
          "size_mb": ${{ steps.prepare.outputs.size-mb }},
          "file_count": ${{ steps.prepare.outputs.file-count }},
          "repository": "$GITHUB_REPOSITORY"
        }
        EOF
        
        echo "assets-created=true" >> $GITHUB_OUTPUT
        echo "archive-name=$ARCHIVE_PATH" >> $GITHUB_OUTPUT
        echo "checksum-name=$CHECKSUM_PATH" >> $GITHUB_OUTPUT
        echo "manifest-name=$MANIFEST_PATH" >> $GITHUB_OUTPUT
        echo "✅ Release assets created"

    - name: Upload release assets
      id: upload-release
      if: inputs.create-release-assets == 'true' && steps.create-assets.outputs.assets-created == 'true'
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
      with:
        files: |
          ${{ steps.create-assets.outputs.archive-name }}
          ${{ steps.create-assets.outputs.checksum-name }}
          ${{ steps.create-assets.outputs.manifest-name }}
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Display Deployment Info
      shell: bash
      run: |
        echo "::group::Deployment Summary"
        echo "✅ Deployment successful!"
        echo "📍 Page URL: ${{ steps.deployment.outputs.page_url }}"
        if [ -n "${{ inputs.cname }}" ]; then
          echo "🌐 Custom domain: ${{ inputs.cname }}"
        fi
        if [ "${{ steps.create-assets.outputs.assets-created }}" == "true" ]; then
          echo "📦 Release assets uploaded to: https://github.com/$GITHUB_REPOSITORY/releases/tag/$GITHUB_REF_NAME"
        fi
        echo "::endgroup::"

branding:
  icon: 'globe'
  color: 'blue'
