# Dependabot configuration.
#
# Dependabot PRs run as `dependabot[bot]`, which the preview-* actions already
# skip (no secret access), so these PRs won't trigger preview deploys.
#
# Each ecosystem uses two groups so updates land as at most two PRs (no
# per-directory duplicates):
#   - "<eco>"        — minor/patch updates (low risk; safe to merge together)
#   - "<eco>-major"  — major updates (review carefully before merging)
# Specific updates we're not ready for are blocked outright via `ignore`.
version: 2
updates:
  # ── Conda environments (container images) ──────────────────────────────────
  # The conda ecosystem (GA Dec 2025) resolves Python packages via PyPI — it
  # tracks the `pip:` block (jupyter-book, quantecon-book-theme, the sphinx-*
  # extensions, kaleido) and Python conda deps. Conda-only entries such as the
  # `anaconda` metapackage and `nodejs` are not on PyPI and won't be updated.
  - package-ecosystem: "conda"
    directories:
      - "/containers/quantecon"
      - "/containers/quantecon-build"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "maintenance"
    commit-message:
      prefix: "deps"
    groups:
      conda:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      conda-major:
        patterns:
          - "*"
        update-types:
          - "major"
    ignore:
      # Python is pinned deliberately (matched to the image base); bump manually.
      - dependency-name: "python"
      # jupyter-book 2.x is a major rewrite — stay on 1.x until we opt in.
      - dependency-name: "jupyter-book"
        update-types: ["version-update:semver-major"]
      # Cap node at the current LTS (24); don't propose the non-LTS 25+ lines.
      - dependency-name: "nodejs"
        versions: [">=25"]

  # ── Third-party GitHub Actions ─────────────────────────────────────────────
  # "/" covers .github/workflows/; for github-actions, composite actions in
  # subdirectories must each be listed explicitly (Dependabot only scans the
  # given directory's action.yml, not nested ones). The two groups collapse the
  # same action repeated across these directories into a single PR.
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/setup-environment"
      - "/build-lectures"
      - "/build-jupyter-cache"
      - "/restore-jupyter-cache"
      - "/preview-netlify"
      - "/preview-cloudflare"
      - "/publish-gh-pages"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "maintenance"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      github-actions-major:
        patterns:
          - "*"
        update-types:
          - "major"
    ignore:
      # Don't propose bumps to our own internal sibling references (floating @v0).
      - dependency-name: "quantecon/actions*"

  # ── Container base image ───────────────────────────────────────────────────
  # Tracks the `FROM ubuntu:24.04` base in each Dockerfile (not the Miniconda
  # installer, which is pinned + checksummed in the RUN step).
  - package-ecosystem: "docker"
    directories:
      - "/containers/quantecon"
      - "/containers/quantecon-build"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "maintenance"
    commit-message:
      prefix: "deps"
    groups:
      docker:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      docker-major:
        patterns:
          - "*"
        update-types:
          - "major"
    ignore:
      # Stay on the 24.04 LTS base; bump deliberately when moving to the next LTS.
      - dependency-name: "ubuntu"
